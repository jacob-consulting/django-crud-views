<ul>
{% for node in items %}
    <li>
        {% if node.obj is None %}
            <em>(restricted)</em>
        {% elif node.url %}
            <a href="{{ node.url }}">{{ node.obj }}</a>
        {% else %}
            {{ node.obj }}
        {% endif %}
        {% if node.children %}
            {% include "crud_views/snippets/delete/related_objects_tree.html" with items=node.children %}
        {% endif %}
    </li>
{% endfor %}
</ul>
