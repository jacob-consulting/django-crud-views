version: '3'

tasks:

  run:
    desc: Migrate, seed and start the example server
    cmds:
      - uv run manage.py migrate
      - uv run manage.py seed
      - uv run manage.py runserver 0.0.0.0:8000

  seed:
    desc: Migrate and (re)seed demo data — idempotent
    cmds:
      - uv run manage.py migrate
      - uv run manage.py seed

  test:
    cmds:
      - uv run pytest

  migrations:
    cmds:
      - uv run manage.py makemigrations

  shell:
    cmds:
      - uv run manage.py shell

  msg-make:
    desc: Extract translatable strings for the example app
    cmds:
      - for: { var: LOCALES }
        cmd: uv run manage.py makemessages -l {{ .ITEM }}
    vars:
      LOCALES: "de fr es pt it zh_Hans"

  msg-comp:
    desc: Compile the example app message catalog
    cmds:
      - uv run manage.py compilemessages
