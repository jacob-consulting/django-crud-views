{% load crud_views %}

{% include "crud_views/snippets/card_order.html" %}

<div class="row">
    {% for object in object_list %}
        <div class="{{ view.cv_card_container_class }}">
            {% cv_card object %}
        </div>
        {% empty %}
        <div class="col-12">
            <p class="text-muted">No items found.</p>
        </div>
    {% endfor %}
</div>

{% cv_pagination %}
