version: '3'

vars:
  PYTHON: "3.12"

includes:
  examples:
    taskfile: examples/bootstrap5/taskfile.yaml
    dir: examples/bootstrap5

tasks:

  dev:
    cmds:
      - task: dev-venv
      - task: dev-install

  dev-venv:
    cmds:
      - uv venv --python={{ .PYTHON }} --clear
    silent: true

  dev-install:
    cmds:
      - uv pip install --upgrade .[all,dev,test,examples]
    silent: true

  run:
    desc: Migrate, seed and serve the example project (delegates to examples/bootstrap5)
    cmds:
      - task: examples:run

  format:
    cmds:
      - uv run ruff format .
    silent: true

  check:
    cmds:
      - uv run ruff check --fix .
    silent: true

  build:
    cmds:
      - uv build
    silent: true

  docs:
    cmds:
      - mkdocs serve -a localhost:8001
    silent: true

  cleanup:
    cmds:
      - find . -type d -name "__pycache__" -exec rm -r {} +
      - rm -rf .nox dist
    silent: true

  bump-patch:
    cmds:
      - bump-my-version bump patch
    silent: true

  test:
    cmds:
      - uv run nox -p
      - rm -rf .nox
    silent: true

  test-js:
    desc: Run the JS unit tests (Vitest + jsdom, requires Node 20+)
    cmds:
      - test -d node_modules || npm ci
      - npx vitest run
    silent: true

  test-js-watch:
    desc: Run the JS unit tests in watch mode
    cmds:
      - test -d node_modules || npm ci
      - npx vitest
    silent: true

  install-skill-claude:
    cmds:
      - rm -rf ~/.claude/skills/django-crud-views
      - cp -r skills/django-crud-views ~/.claude/skills/
    silent: true

  msg-make-crud_views:
    dir: src/crud_views
    cmd: PYTHONPATH=../.. python -m django makemessages -l de --settings=settings_i18n

  msg-comp-crud_views:
    dir: src/crud_views
    cmd: PYTHONPATH=../.. python -m django compilemessages --settings=settings_i18n
